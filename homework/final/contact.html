<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="assets/styles/mainContact.css">
</head>
<body>
    <a href="#main_content" class="skip">skip to content</a>
    <header class="nav_header" aria-label="navigation header">
        <nav class="desktop-buttons" aria-label="navigation buttons">
            <ul>
                <li><a href="about.html"><button aria-label="about">About</button></li>
                <li><a href="index.html"><button aria-label="home">Home</button></a></li>
                <li><a href="contact.html"><button aria-label="contact">Contact</button></a></li>
            </ul>
        </nav>
        <nav aria-label="Mobile menu section">
            <button class="menu-button" aria-label="menu">Menu</button>
        </nav>
    </header>

<main id="main_content">
    <form novalidate aria-label="Contact form">
        <fieldset>
            <legend class="contactHeading">Contact Form</legend>

            <label for="firstName">
                Enter your first name
                <span class="required-label" aria-hidden="true">*</span>
            </label>
            <input type="text"
                id="firstName"
                name="firstName"
                required
                aria-required="true"
                aria-invalid="false"
                aria-describedby="firstName-error"/>
            <span
                id="firstName-error"
                class="error-message"
                role="alert"
                aria-live="polite">
            </span>

            <label for="lastName">
                Enter your last name
                <span class="required-label" aria-hidden="true">*</span>
            </label>
            <input type="text"
                id="lastName"
                name="lastName"
                required
                aria-required="true"
                aria-invalid="false"
                aria-describedby="lastName-error"/>
            <span
                id="lastName-error"
                class="error-message"
                role="alert"
                aria-live="polite">
            </span>

            <label for="email">
                Enter your email address
                <span class="required-label" aria-hidden="true">*</span>
            </label>
            <input type="email"
                id="email"
                name="email"
                required
                aria-required="true"
                aria-invalid="false"
                aria-describedby="email-error"
                autocomplete="email"/>
            <span
                id="email-error"
                class="error-message"
                role="alert"
                aria-live="polite">
            </span>

            <label for="message">
                Enter your message
                <span class="required-label" aria-hidden="true">*</span>
            </label>
            <textarea
                id="message"
                name="message"
                required
                aria-required="true"
                aria-invalid="false"
                aria-describedby="message-error">
            </textarea>
            <span
                id="message-error"
                class="error-message"
                role="alert"
                aria-live="polite">
            </span>

        </fieldset>

        <p id="success-message" aria-live="polite" aria-atomic="true" style="display:none;"></p>
        <button class="submitButton" aria-label="Submit contact form" type="submit">Submit</button>
    </form>
</main>

    <script src="assets/scripts/main.js"></script>
</body>
</html>
